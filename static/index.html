<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepFace Verify</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; max-width: 900px; }
      h1 { margin: 0 0 12px; }
      .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; background: #fff; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      label { display: block; font-weight: 600; margin-bottom: 8px; }
      input[type=file] { width: 100%; }
      button { margin-top: 16px; padding: 10px 14px; border: 0; border-radius: 8px; background: #111827; color: #fff; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      pre { background: #0b1020; color: #e5e7eb; padding: 14px; border-radius: 10px; overflow: auto; }
      .muted { color: #6b7280; font-size: 14px; }
      .status { margin-top: 12px; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>DeepFace Verify</h1>
    <p class="muted">Upload two face images and test whether they are the same person using <code>DeepFace.verify</code>.</p>

    <div class="card">
      <div class="row">
        <div>
          <label for="image1">Image 1</label>
          <input id="image1" type="file" accept="image/*" />
        </div>
        <div>
          <label for="image2">Image 2</label>
          <input id="image2" type="file" accept="image/*" />
        </div>
      </div>

      <button id="btn">Verify</button>
      <div id="status" class="status"></div>
      <h3>Response</h3>
      <pre id="out">(no response yet)</pre>
    </div>

    <script>
      const btn = document.getElementById('btn');
      const out = document.getElementById('out');
      const statusEl = document.getElementById('status');

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      btn.addEventListener('click', async () => {
        const f1 = document.getElementById('image1').files[0];
        const f2 = document.getElementById('image2').files[0];

        if (!f1 || !f2) {
          setStatus('Please select both images.');
          return;
        }

        btn.disabled = true;
        setStatus('Verifying...');
        out.textContent = '';

        try {
          const fd = new FormData();
          fd.append('image1', f1);
          fd.append('image2', f2);

          const res = await fetch('/api/verify', {
            method: 'POST',
            body: fd
          });

          const text = await res.text();
          let json;
          try { json = JSON.parse(text); } catch { json = { raw: text }; }

          if (!res.ok) {
            setStatus('Request failed: ' + res.status);
          } else {
            setStatus('Done.');
          }

          out.textContent = JSON.stringify(json, null, 2);
        } catch (e) {
          setStatus('Error: ' + (e?.message || e));
          out.textContent = String(e);
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
