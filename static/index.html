<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepFace</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; max-width: 900px; }
      h1 { margin: 0 0 12px; }
      .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px; background: #fff; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      label { display: block; font-weight: 600; margin-bottom: 8px; }
      input[type=file] { width: 100%; }
      button { margin-top: 16px; padding: 10px 14px; border: 0; border-radius: 8px; background: #111827; color: #fff; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      pre { background: #0b1020; color: #e5e7eb; padding: 14px; border-radius: 10px; overflow: auto; }
      .muted { color: #6b7280; font-size: 14px; }
      .status { margin-top: 12px; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>DeepFace</h1>
    <p class="muted">Test face verification and search using <code>DeepFace.verify</code> and <code>DeepFace.find</code>.</p>

    <div class="card">
      <h2>Compare (Verify)</h2>
      <div class="row">
        <div>
          <label for="image1">Image 1</label>
          <input id="image1" type="file" accept="image/*" />
        </div>
        <div>
          <label for="image2">Image 2</label>
          <input id="image2" type="file" accept="image/*" />
        </div>
      </div>

      <button id="btnVerify">Verify</button>
      <div id="statusVerify" class="status"></div>
      <h3>Response</h3>
      <pre id="outVerify">(no response yet)</pre>
    </div>

    <div class="card" style="margin-top: 16px;">
      <h2>Search (Find)</h2>

      <div class="row" style="grid-template-columns: 1fr;">
        <div>
          <label for="findImage">Query Image</label>
          <input id="findImage" type="file" accept="image/*" />
        </div>
      </div>

      <button id="btnFind">Find</button>
      <div id="statusFind" class="status"></div>
      <h3>Response</h3>
      <pre id="outFind">(no response yet)</pre>
    </div>

    <script>
      const btnVerify = document.getElementById('btnVerify');
      const outVerify = document.getElementById('outVerify');
      const statusVerifyEl = document.getElementById('statusVerify');

      const btnFind = document.getElementById('btnFind');
      const outFind = document.getElementById('outFind');
      const statusFindEl = document.getElementById('statusFind');

      function setStatus(el, msg) {
        el.textContent = msg;
      }

      btnVerify.addEventListener('click', async () => {
        const f1 = document.getElementById('image1').files[0];
        const f2 = document.getElementById('image2').files[0];

        if (!f1 || !f2) {
          setStatus(statusVerifyEl, 'Please select both images.');
          return;
        }

        btnVerify.disabled = true;
        setStatus(statusVerifyEl, 'Verifying...');
        outVerify.textContent = '';

        try {
          const fd = new FormData();
          fd.append('image1', f1);
          fd.append('image2', f2);

          const res = await fetch('/api/verify', {
            method: 'POST',
            body: fd
          });

          const text = await res.text();
          let json;
          try { json = JSON.parse(text); } catch { json = { raw: text }; }

          if (!res.ok) {
            setStatus(statusVerifyEl, 'Request failed: ' + res.status);
          } else {
            setStatus(statusVerifyEl, 'Done.');
          }

          outVerify.textContent = JSON.stringify(json, null, 2);
        } catch (e) {
          setStatus(statusVerifyEl, 'Error: ' + (e?.message || e));
          outVerify.textContent = String(e);
        } finally {
          btnVerify.disabled = false;
        }
      });

      btnFind.addEventListener('click', async () => {
        const f = document.getElementById('findImage').files[0];

        if (!f) {
          setStatus(statusFindEl, 'Please select an image.');
          return;
        }

        btnFind.disabled = true;
        setStatus(statusFindEl, 'Searching...');
        outFind.textContent = '';

        try {
          const fd = new FormData();
          fd.append('image', f);

          const res = await fetch('/api/find', {
            method: 'POST',
            body: fd
          });

          const text = await res.text();
          let json;
          try { json = JSON.parse(text); } catch { json = { raw: text }; }

          if (!res.ok) {
            const detail = (json && json.detail) ? (' - ' + json.detail) : '';
            setStatus(statusFindEl, 'Request failed: ' + res.status + detail);
          } else {
            setStatus(statusFindEl, 'Done.');
          }

          outFind.textContent = JSON.stringify(json, null, 2);
        } catch (e) {
          setStatus(statusFindEl, 'Error: ' + (e?.message || e));
          outFind.textContent = String(e);
        } finally {
          btnFind.disabled = false;
        }
      });
    </script>
  </body>
</html>
